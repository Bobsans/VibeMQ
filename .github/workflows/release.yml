name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: false

jobs:
  # Stage 1: build, test, pack. No publishing.
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify version format
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Invalid version format. Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore -p:GITHUB_ACTIONS=true -p:Version=${{ steps.get_version.outputs.version_num }} -p:PackageVersion=${{ steps.get_version.outputs.version_num }}

      - name: Run unit tests
        run: dotnet test --configuration Release --filter "FullyQualifiedName~VibeMQ.Tests.Unit" --verbosity minimal -p:GITHUB_ACTIONS=true -p:Version=${{ steps.get_version.outputs.version_num }} -p:PackageVersion=${{ steps.get_version.outputs.version_num }}

      - name: Run integration tests
        run: dotnet test --configuration Release --filter "FullyQualifiedName~VibeMQ.Tests.Integration" --verbosity minimal -p:GITHUB_ACTIONS=true -p:Version=${{ steps.get_version.outputs.version_num }} -p:PackageVersion=${{ steps.get_version.outputs.version_num }}

      - name: Build projects
        run: dotnet build --no-incremental --configuration Release -p:GITHUB_ACTIONS=true -p:Version=${{ steps.get_version.outputs.version_num }} -p:PackageVersion=${{ steps.get_version.outputs.version_num }}

      - name: Pack NuGet packages
        run: dotnet pack --no-build --configuration Release --output ./artifacts -p:Version=${{ steps.get_version.outputs.version_num }} -p:PackageVersion=${{ steps.get_version.outputs.version_num }}

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 90

  # Stage 2a: publish to NuGet and create GitHub Release (runs after build-and-test succeeds)
  publish-nuget:
    name: Publish to NuGet and GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download NuGet packages
        uses: actions/download-artifact@v6
        with:
          name: nuget-packages

      - name: Publish to NuGet.org
        run: |
          for package in ./*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --no-symbols
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Release ${{ steps.get_version.outputs.version }}
            
            This release includes all VibeMQ packages:
            - VibeMQ.Core
            - VibeMQ.Client
            - VibeMQ.Server
            - VibeMQ.Client.DependencyInjection
            - VibeMQ.Server.DependencyInjection
            
            See [changelog](https://github.com/${{ github.repository }}/blob/main/docs/docs/changelog.rst) for details.
          draft: false
          prerelease: false
          files: ./*.nupkg

  # Stage 2b: build and push Docker images (runs after build-and-test succeeds, in parallel with publish-nuget)
  docker:
    name: Publish to Docker Hub
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (broker only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibemq:${{ steps.get_version.outputs.version_num }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vibemq:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (broker + Web UI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.webui
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibemq-webui:${{ steps.get_version.outputs.version_num }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vibemq-webui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
